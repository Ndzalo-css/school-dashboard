apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: school-dashboard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Ndzalo-css/school-dashboard.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: school-dashboard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true