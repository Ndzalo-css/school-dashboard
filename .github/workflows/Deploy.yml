name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Validate HTML exists
      run: |
        if [ ! -f index.html ]; then
          echo "index.html missing!"
          exit 1
        fi

    - name: Check CSS
      run: |
        if [ ! -f style.css ]; then
          echo "style.css missing!"
          exit 1
        fi

    - name: Success message
      run: echo "Pipeline passed successfully"