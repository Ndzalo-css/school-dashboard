name: School Dashboard CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

# âś… Hardcoded (confirmed correct)
env:
  DOCKER_REPO: ndzalo9707/school-dashboard

jobs:
  build-and-push:
    name: Build, Tag, and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Validate Docker Repo
        run: |
          echo "Repo length: ${#DOCKER_REPO}"

          if [ -z "${DOCKER_REPO}" ]; then
            echo "ERROR: DOCKER_REPO is empty"
            exit 1
          fi

          if [[ "${DOCKER_REPO}" != *"/"* ]]; then
            echo "ERROR: DOCKER_REPO must be in format username/repo"
            exit 1
          fi

          echo "Using Docker repo: ${DOCKER_REPO}"

      # đź”Ą Clean any hidden characters (extra safety)
      - name: Clean Docker Repo
        run: |
          CLEAN_REPO=$(echo "${DOCKER_REPO}" | xargs)
          echo "CLEAN_REPO=$CLEAN_REPO" >> $GITHUB_ENV

      - name: Generate Version
        id: version
        run: |
          git fetch --tags

          latest=$(git tag -l "v*" | sort -V | tail -n 1)

          if [ -z "$latest" ]; then
            new_version="v1"
          else
            number=$(echo $latest | tr -d 'v')
            number=$((number + 1))
            new_version="v$number"
          fi

          echo "NEW_VERSION=$new_version" >> $GITHUB_ENV
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Create Git Tag (${{ steps.version.outputs.version }})
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $NEW_VERSION
          git push origin $NEW_VERSION

      - name: Debug Tag Values
        run: |
          echo "Docker Repo: ${CLEAN_REPO}"
          echo "Version: ${NEW_VERSION}"

      - name: Build Docker Image (${{ steps.version.outputs.version }})
        run: |
          docker build \
            --build-arg APP_VERSION=${NEW_VERSION} \
            -t ${CLEAN_REPO}:${NEW_VERSION} \
            -t ${CLEAN_REPO}:latest .

      - name: Push Docker Image (${{ steps.version.outputs.version }})
        run: |
          docker push ${CLEAN_REPO}:${NEW_VERSION}
          docker push ${CLEAN_REPO}:latest

      - name: Success
        run: echo "Successfully pushed ${CLEAN_REPO}:${NEW_VERSION}"
