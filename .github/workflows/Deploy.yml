name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t school-dashboard .

    - name: Run container test
      run: |
        docker run -d -p 8080:80 school-dashboard
        sleep 5
        curl -f http://localhost:8080 || exit 1

    - name: Success
      run: echo "Docker container works!"