name: School Dashboard CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  DOCKER_REPO: ndzalo9707/school-dashboard

jobs:
  build-and-push:
    name: Build, Tag, and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Validate Docker Repo
        run: |
          echo "Repo: ${DOCKER_REPO}"
          if [ -z "${DOCKER_REPO}" ]; then
            echo "ERROR: DOCKER_REPO is empty"
            exit 1
          fi
          if [[ "${DOCKER_REPO}" != *"/"* ]]; then
            echo "ERROR: DOCKER_REPO must be in format username/repo"
            exit 1
          fi
          echo "Docker repo is valid: ${DOCKER_REPO}"

      - name: Generate Version
        id: version
        run: |
          git fetch --tags --force

          # Get all vN tags, sorted numerically
          latest=$(git tag -l "v[0-9]*" | sed 's/v//' | sort -n | tail -n 1)

          if [ -z "$latest" ]; then
            new_version="v1"
          else
            new_version="v$((latest + 1))"
          fi

          # Validate before writing
          if [ -z "$new_version" ]; then
            echo "ERROR: Failed to generate version"
            exit 1
          fi

          echo "Generated version: $new_version"
          echo "NEW_VERSION=$new_version" >> $GITHUB_ENV
          echo "version=$new_version" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        run: |
          # Guard: ensure NEW_VERSION is set
          if [ -z "${NEW_VERSION}" ]; then
            echo "ERROR: NEW_VERSION is empty, cannot create tag"
            exit 1
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          # Skip if tag already exists (handles re-runs)
          if git rev-parse "${NEW_VERSION}" >/dev/null 2>&1; then
            echo "Tag ${NEW_VERSION} already exists, skipping"
          else
            git tag "${NEW_VERSION}"
            git push origin "${NEW_VERSION}"
            echo "Created and pushed tag: ${NEW_VERSION}"
          fi

      - name: Debug Tag Values
        run: |
          echo "Docker Repo: ${DOCKER_REPO}"
          echo "Version: ${NEW_VERSION}"

      - name: Build Docker Image
        run: |
          docker build \
            --build-arg APP_VERSION="${NEW_VERSION}" \
            -t "${DOCKER_REPO}:${NEW_VERSION}" \
            -t "${DOCKER_REPO}:latest" .

      - name: Push Docker Image
        run: |
          docker push "${DOCKER_REPO}:${NEW_VERSION}"
          docker push "${DOCKER_REPO}:latest"

      - name: Success
        run: echo "Successfully pushed ${DOCKER_REPO}:${NEW_VERSION}"