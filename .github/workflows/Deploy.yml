name: School Dashboard CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  DOCKER_REPO: ndzalo9707/school-dashboard

jobs:
  build-scan-push:
    name: Build, Tag, and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set Short SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t $DOCKER_REPO:latest -t $DOCKER_REPO:sha-$SHORT_SHA .

      - name: Push Docker Images
        run: |
          docker push $DOCKER_REPO:latest
          docker push $DOCKER_REPO:sha-$SHORT_SHA

      - name: Success
        run: echo "Pushed $DOCKER_REPO:sha-$SHORT_SHA and $DOCKER_REPO:latest"