name: School Dashboard CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  DOCKER_REPO: ${{ secrets.DOCKER_REPO }}

jobs:
  build-and-push:
    name: Build, Tag, and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 🔐 Login to Docker Hub
      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
          -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 📦 Generate version (v1, v2, v3...)
      - name: Generate Version
        id: version
        run: |
          git fetch --tags

          latest=$(git tag -l "v*" | sort -V | tail -n 1)

          if [ -z "$latest" ]; then
            new_version="v1"
          else
            number=$(echo $latest | tr -d 'v')
            number=$((number + 1))
            new_version="v$number"
          fi

          echo "NEW_VERSION=$new_version" >> $GITHUB_ENV
          echo "version=$new_version" >> $GITHUB_OUTPUT

      # 🏷️ Create Git tag
      - name: Create Git Tag (${{ steps.version.outputs.version }})
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $NEW_VERSION
          git push origin $NEW_VERSION

      # 🐳 Build Docker Image
      - name: Build Docker Image (${{ steps.version.outputs.version }})
        run: |
          docker build \
            --build-arg APP_VERSION=${NEW_VERSION} \
            -t ${DOCKER_REPO}:${NEW_VERSION} \
            -t ${DOCKER_REPO}:latest .

      # 🚀 Push to Docker Hub
      - name: Push Docker Image (${{ steps.version.outputs.version }})
        run: |
          docker push ${DOCKER_REPO}:${NEW_VERSION}
          docker push ${DOCKER_REPO}:latest

      - name: Success
        run: echo "Successfully pushed ${DOCKER_REPO}:${NEW_VERSION}"