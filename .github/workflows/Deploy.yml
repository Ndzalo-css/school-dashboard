name: School Dashboard CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-scan-push:
    name: Build, Tag, and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Increment Version
        run: |
          CURRENT=${{ vars.IMAGE_VERSION }}
          NEW_VERSION=$((CURRENT + 1))
          echo "NEW_VERSION=v$NEW_VERSION" >> $GITHUB_ENV

          # Update the variable in GitHub so next run sees the incremented value
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/variables/IMAGE_VERSION \
            -d "{\"name\":\"IMAGE_VERSION\",\"value\":\"$NEW_VERSION\"}"

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ vars.DOCKER_REPO }}:${NEW_VERSION} \
            -t ${{ vars.DOCKER_REPO }}:latest .

      - name: Push Docker Images
        run: |
          docker push ${{ vars.DOCKER_REPO }}:${NEW_VERSION}
          docker push ${{ vars.DOCKER_REPO }}:latest

      - name: Success
        run: echo "Pushed ${{ vars.DOCKER_REPO }}:${NEW_VERSION} and ${{ vars.DOCKER_REPO }}:latest"