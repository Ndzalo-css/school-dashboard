name: School Dashboard UAT CI/CD Pipeline

on:
  push:
    branches:
      - uat

jobs:
  build-and-push-frontend:
    name: Build and Push Frontend Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/uat'
    environment: uat-env

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Frontend Tags
        run: |
          NEW_TAG="uat-v${{ github.run_number }}"
          echo "FRONTEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/school-dashboard-frontend" >> $GITHUB_ENV
          echo "FRONTEND_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "FRONTEND_LATEST=uat-latest" >> $GITHUB_ENV

      - name: Build Frontend Docker Image
        run: |
          echo "Building frontend image: $FRONTEND_IMAGE:$FRONTEND_TAG"
          docker build \
            -f frontend/Dockerfile \
            -t $FRONTEND_IMAGE:$FRONTEND_TAG \
            -t $FRONTEND_IMAGE:$FRONTEND_LATEST \
            ./frontend

      - name: Push Frontend Docker Image
        run: |
          docker push $FRONTEND_IMAGE:$FRONTEND_TAG
          docker push $FRONTEND_IMAGE:$FRONTEND_LATEST

      - name: Logout from Docker Hub
        if: always()
        run: docker logout

  build-and-push-backend:
    name: Build and Push Backend Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/uat'
    environment: uat-env

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Backend Tags
        run: |
          NEW_TAG="uat-v${{ github.run_number }}"
          echo "BACKEND_IMAGE=${{ secrets.DOCKER_USERNAME }}/school-dashboard-backend" >> $GITHUB_ENV
          echo "BACKEND_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "BACKEND_LATEST=uat-latest" >> $GITHUB_ENV

      - name: Build Backend Docker Image
        run: |
          echo "Building backend image: $BACKEND_IMAGE:$BACKEND_TAG"
          docker build \
            -f backend/Dockerfile.backend \
            -t $BACKEND_IMAGE:$BACKEND_TAG \
            -t $BACKEND_IMAGE:$BACKEND_LATEST \
            ./backend

      - name: Push Backend Docker Image
        run: |
          docker push $BACKEND_IMAGE:$BACKEND_TAG
          docker push $BACKEND_IMAGE:$BACKEND_LATEST

      - name: Logout from Docker Hub
        if: always()
        run: docker logout
