name: School Dashboard CI/CD Pipeline

on:
  push:
    branches:
      - uat

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/uat'
    environment: uat-env

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Version Tag
        id: set_tag
        run: |
          NEW_TAG="uat-v${{ github.run_number }}"
          IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:$NEW_TAG"

          echo "New Tag: $NEW_TAG"
          echo "Image Name: $IMAGE_NAME"

          echo "FINAL_IMAGE=$IMAGE_NAME" >> $GITHUB_ENV
          echo "LATEST_IMAGE=${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:uat-latest" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          echo "Building: $FINAL_IMAGE"
          docker build \
            -t $FINAL_IMAGE \
            -t $LATEST_IMAGE .

      - name: Push Docker Image
        run: |
          docker push $FINAL_IMAGE
          docker push $LATEST_IMAGE

      - name: Logout from Docker Hub
        if: always()
        run: docker logout

      - name: Success
        run: echo "Successfully pushed $FINAL_IMAGE and $LATEST_IMAGE"