<!DOCTYPE html>
<html>
<head>
    <title>School Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎓 School Dashboard</h1>
</header>

<section class="cards">
    <div class="card green">
        <h2>120</h2>
        <p>Students</p>
    </div>
    <div class="card yellow">
        <h2>8</h2>
        <p>Classes</p>
    </div>
    <div class="card orange">
        <h2>78%</h2>
        <p>Performance</p>
    </div>
    <div class="card purple">
        <h2>5</h2>
        <p>Teachers</p>
    </div>
</section>

<section>
    <h2>📊 Student Performance</h2>
    <table>
        <tr>
            <th>Name</th>
            <th>Score</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Amanda</td>
            <td>85%</td>
            <td class="good">Good</td>
        </tr>
        <tr>
            <td>John</td>
            <td>72%</td>
            <td class="average">Average</td>
        </tr>
    </table>
</section>

</body>
</html>
